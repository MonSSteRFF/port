name: "port:prod"

services:
  mongodb:
    image: mongo:latest
    container_name: port_mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=port
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=secret
    networks:
      - port_network
    volumes:
      - mongodb_data:/data/db
    restart: always

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: port_app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=prod
    volumes:
      - ./backend/.env.prod:/app/dist/.env.prod
    depends_on:
      - mongodb
    networks:
      - port_network
    restart: always

volumes:
  mongodb_data:

networks:
  port_network:
    driver: bridge